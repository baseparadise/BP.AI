kind = "mobile"
previewPath = "/"
title = "Gemini AI Mobile"
version = "1.0.0"
id = "artifacts/gemini-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18696

[services.development]
run = "pnpm --filter @workspace/gemini-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gemini-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gemini-mobile", "run", "serve" ]

[services.env]
PORT = "18696"
BASE_PATH = "/"
